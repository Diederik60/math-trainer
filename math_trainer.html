<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<title>Mental Math Trainer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    background: #0a0a0a;
    color: #f5f5f5;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
  }
  body {
    display: flex;
    flex-direction: column;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  #app {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  button {
    font-family: inherit;
    border: none;
    background: none;
    color: inherit;
    cursor: pointer;
    font-size: inherit;
  }

  /* HOME SCREEN */
  .home {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 24px 20px;
    overflow-y: auto;
  }
  .home h1 {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 6px;
    letter-spacing: -0.5px;
  }
  .home .sub {
    color: #888;
    font-size: 15px;
    margin-bottom: 28px;
  }
  .mode-btn {
    background: #1a1a1a;
    border: 1px solid #262626;
    border-radius: 14px;
    padding: 18px 18px;
    text-align: left;
    margin-bottom: 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    transition: background 0.1s ease;
    width: 100%;
  }
  .mode-btn:active { background: #242424; }
  .mode-btn .title {
    font-size: 17px;
    font-weight: 600;
  }
  .mode-btn .desc {
    font-size: 13px;
    color: #888;
    line-height: 1.35;
  }
  .timer-row {
    margin-top: 20px;
    margin-bottom: 8px;
  }
  .timer-row .label {
    font-size: 13px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 10px;
  }
  .timer-options {
    display: flex;
    gap: 8px;
  }
  .timer-opt {
    flex: 1;
    padding: 14px 0;
    background: #1a1a1a;
    border: 1px solid #262626;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    color: #888;
  }
  .timer-opt.active {
    background: #2563eb;
    border-color: #2563eb;
    color: white;
  }

  /* PLAY SCREEN */
  .play {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .topbar {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    gap: 12px;
    border-bottom: 1px solid #1a1a1a;
  }
  .home-btn {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .home-btn:active { background: #262626; }
  .home-btn svg { width: 20px; height: 20px; stroke: #f5f5f5; }
  .stats {
    flex: 1;
    display: flex;
    justify-content: space-around;
    font-size: 13px;
  }
  .stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .stat .label {
    color: #888;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .stat .value {
    font-size: 18px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .stat .value.streak { color: #f59e0b; }
  .stat .value.score { color: #10b981; }

  .timer-bar {
    height: 4px;
    background: #1a1a1a;
    position: relative;
  }
  .timer-fill {
    position: absolute;
    left: 0;
    top: 0;
    height: 100%;
    background: #2563eb;
    transition: background-color 0.2s;
  }
  .timer-fill.warning { background: #f59e0b; }
  .timer-fill.danger { background: #ef4444; }

  .problem-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    min-height: 0;
  }
  .problem {
    font-size: 44px;
    font-weight: 600;
    text-align: center;
    line-height: 1.2;
    font-variant-numeric: tabular-nums;
    margin-bottom: 20px;
  }
  .problem .small {
    font-size: 22px;
    color: #888;
    margin-bottom: 6px;
    font-weight: 500;
  }
  .answer-display {
    font-size: 36px;
    font-weight: 600;
    min-height: 50px;
    padding: 10px 24px;
    border-radius: 12px;
    background: #1a1a1a;
    min-width: 140px;
    text-align: center;
    font-variant-numeric: tabular-nums;
    border: 2px solid transparent;
    color: #f5f5f5;
  }
  .answer-display.correct {
    background: #064e3b;
    border-color: #10b981;
    color: #6ee7b7;
  }
  .answer-display.wrong {
    background: #4c0519;
    border-color: #ef4444;
    color: #fda4af;
  }
  .answer-display .placeholder { color: #444; }
  .feedback {
    margin-top: 16px;
    font-size: 15px;
    min-height: 22px;
    text-align: center;
    color: #888;
  }
  .feedback.correct { color: #10b981; }
  .feedback.wrong { color: #ef4444; }

  /* KEYPAD */
  .keypad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    padding: 10px 12px 16px;
    background: #0a0a0a;
  }
  .key {
    height: 60px;
    background: #1a1a1a;
    border: 1px solid #262626;
    border-radius: 14px;
    font-size: 26px;
    font-weight: 500;
    color: #f5f5f5;
    font-variant-numeric: tabular-nums;
    display: flex;
    align-items: center;
    justify-content: center;
    touch-action: manipulation;
    user-select: none;
    -webkit-user-select: none;
  }
  .key:active { background: #333; }
  .key.action {
    background: #1f2937;
    font-size: 18px;
    font-weight: 600;
  }
  .key.action:active { background: #374151; }
  .key.submit {
    background: #2563eb;
    color: white;
    grid-column: span 1;
  }
  .key.submit:active { background: #1d4ed8; }
  .key.disabled {
    opacity: 0.4;
    pointer-events: none;
  }

  @media (max-height: 700px) {
    .problem { font-size: 36px; }
    .answer-display { font-size: 30px; }
    .key { height: 52px; font-size: 24px; }
  }
  @media (max-height: 600px) {
    .problem { font-size: 30px; }
    .key { height: 46px; font-size: 22px; }
    .home { padding: 16px; }
    .mode-btn { padding: 14px; margin-bottom: 8px; }
  }

  /* MODE CARD with separate info button */
  .mode-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    align-items: stretch;
  }
  .mode-row .mode-btn { margin-bottom: 0; flex: 1; }
  .info-btn {
    width: 52px;
    background: #1a1a1a;
    border: 1px solid #262626;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 22px;
    font-weight: 600;
    color: #888;
    touch-action: manipulation;
  }
  .info-btn:active { background: #242424; color: #f5f5f5; }
  .play-info-btn {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 18px;
    font-weight: 600;
    color: #888;
    touch-action: manipulation;
  }
  .play-info-btn:active { background: #262626; color: #f5f5f5; }

  /* TIPS SCREEN */
  .tips {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .tips-bar {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    gap: 12px;
    border-bottom: 1px solid #1a1a1a;
  }
  .tips-bar .back {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    touch-action: manipulation;
  }
  .tips-bar .back:active { background: #262626; }
  .tips-bar .back svg { width: 20px; height: 20px; stroke: #f5f5f5; }
  .tips-bar .title-text {
    font-size: 17px;
    font-weight: 600;
    flex: 1;
    text-align: center;
    padding-right: 40px;
  }
  .tips-content {
    flex: 1;
    overflow-y: auto;
    padding: 20px 20px 40px;
    -webkit-overflow-scrolling: touch;
  }
  .tips-content h2 {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 4px;
    letter-spacing: -0.3px;
  }
  .tips-content .intro {
    color: #888;
    font-size: 15px;
    line-height: 1.45;
    margin-bottom: 22px;
  }
  .tips-content h3 {
    font-size: 16px;
    font-weight: 600;
    color: #93c5fd;
    margin: 22px 0 8px;
    letter-spacing: 0.2px;
  }
  .tips-content p {
    font-size: 15px;
    line-height: 1.55;
    color: #d4d4d4;
    margin-bottom: 10px;
  }
  .tips-content .example {
    background: #111;
    border-left: 3px solid #2563eb;
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 14px;
    line-height: 1.55;
    color: #d4d4d4;
    margin: 8px 0 14px;
    font-variant-numeric: tabular-nums;
  }
  .tips-content .example .calc {
    font-family: -apple-system-mono, "SF Mono", Menlo, monospace;
    color: #6ee7b7;
    display: block;
    margin-top: 4px;
    font-size: 14px;
  }
  .tips-content ul {
    margin: 0 0 14px 0;
    padding-left: 20px;
  }
  .tips-content li {
    font-size: 15px;
    line-height: 1.55;
    color: #d4d4d4;
    margin-bottom: 6px;
  }
  .tips-content strong { color: #f5f5f5; font-weight: 600; }
  .tips-content code {
    background: #1a1a1a;
    padding: 2px 6px;
    border-radius: 4px;
    font-family: -apple-system-mono, "SF Mono", Menlo, monospace;
    font-size: 13px;
    color: #fbbf24;
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
(function() {
  'use strict';

  // ============ STATE ============
  const state = {
    screen: 'home',
    mode: null,
    timeLimit: 10,
    score: 0,
    streak: 0,
    bestStreak: 0,
    current: null,
    input: '',
    feedback: null,
    timerStart: 0,
    timerHandle: null,
    locked: false,
  };

  // ============ UTILITIES ============
  function rint(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }
  function pick(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  }
  function gcd(a, b) {
    a = Math.abs(a); b = Math.abs(b);
    while (b) { [a, b] = [b, a % b]; }
    return a;
  }
  function fmtFraction(n, d) {
    const g = gcd(n, d);
    const sn = n / g, sd = d / g;
    if (sd === 1) return String(sn);
    return sn + '/' + sd;
  }
  function fmtNum(n) {
    return n.toLocaleString('en-US');
  }

  // ============ MODES ============
  const MODES = {
    times: {
      title: 'Times Tables (Trio)',
      desc: 'Just the three hardest pairs: 6\u00D77, 6\u00D78, 7\u00D78.',
      generate() {
        const pairs = [[6,7],[6,8],[7,8]];
        const [x, y] = pick(pairs);
        // Randomize order so it doesn't feel rote
        const a = Math.random() < 0.5 ? x : y;
        const b = a === x ? y : x;
        return {
          display: `${a} \u00D7 ${b}`,
          answer: a * b,
          check: (input) => parseInt(input, 10) === a * b,
          exact: String(a * b),
          inputType: 'int',
        };
      }
    },
    fractions: {
      title: 'Ugly Fractions',
      desc: 'Simplify messy fractions like 192 / 24. Integer or reduced.',
      generate() {
        // Goldilocks generator: numerators look ugly (>= 30) but the
        // structure is always one or two cancellations from times-table
        // factors. No paper required.
        let sn, sd, k, num, den;
        for (let attempt = 0; attempt < 20; attempt++) {
          const r = Math.random();
          if (r < 0.55) {
            // Integer answer
            sn = rint(2, 15);
            sd = 1;
          } else {
            // Small simplified fraction with recognizable terms
            const fracs = [[1,2],[1,3],[2,3],[1,4],[3,4],[2,5],[3,5],[4,5],
                           [1,6],[5,6],[3,8],[5,8],[7,8],[2,7],[3,7],[2,9],[4,9],[5,9]];
            [sn, sd] = pick(fracs);
          }
          // Multipliers: each factors into pieces from the small times tables
          // (6=2x3, 8=2x4, 9=3x3, 12=3x4, 14=2x7, 15=3x5, 16=2x8, 18=2x9, 20=4x5, 24=3x8)
          const mults = [6, 8, 9, 12, 14, 15, 16, 18, 20, 24];
          k = pick(mults);
          num = sn * k;
          den = sd * k;
          // Skip the boring ones: numerator too small to look like a real problem
          if (num < 30) continue;
          // Skip ones that are too obviously trivial
          if (num < 50 && den < 12) continue;
          break;
        }
        const correctStr = fmtFraction(num, den);
        return {
          display: `${fmtNum(num)} / ${fmtNum(den)}`,
          answer: correctStr,
          check: (input) => {
            const cleaned = input.replace(/\s+/g, '');
            if (cleaned === correctStr) return true;
            if (cleaned.includes('/')) {
              const [pn, pd] = cleaned.split('/').map(x => parseInt(x, 10));
              if (!pd || isNaN(pn) || isNaN(pd)) return false;
              return pn * den === pd * num;
            } else {
              const v = parseInt(cleaned, 10);
              if (isNaN(v)) return false;
              return v * den === num;
            }
          },
          exact: correctStr,
          inputType: 'frac',
        };
      }
    },
    pct: {
      title: 'Fractions to Decimals',
      desc: 'Convert fractions like 5/8 to decimals. Within \u00B10.01 counts.',
      generate() {
        let n, d;
        do {
          d = pick([6, 7, 8, 9, 11, 12, 13, 14, 16, 17, 18, 19]);
          n = rint(1, d - 1);
        } while (gcd(n, d) === d);
        const exact = n / d;
        // Round display to 4 decimals so it's readable
        const rounded = Math.round(exact * 10000) / 10000;
        return {
          display: `${n} / ${d}`,
          subPrompt: 'as decimal',
          answer: rounded,
          check: (input) => {
            const v = parseFloat(input);
            if (isNaN(v)) return false;
            return Math.abs(v - exact) <= 0.01;
          },
          exact: String(rounded),
          inputType: 'decimal',
        };
      }
    },
    bigmult: {
      title: 'Powers of Ten',
      desc: 'Track the zeros. 100 \u00D7 1000, 300 \u00D7 4000, and so on.',
      generate() {
        // Two flavors:
        //  - pure: 10^a * 10^b, e.g. 100 x 1000
        //  - scaled: (d * 10^a) * (e * 10^b), e.g. 300 x 4000, with small leading digits
        const pure = Math.random() < 0.4;
        let a, b, da, db, valA, valB;
        if (pure) {
          // Pure powers of 10
          a = rint(1, 5);
          b = rint(1, 5);
          // Avoid trivial 10 x 10
          if (a === 1 && b === 1) a = 2;
          da = 1; db = 1;
          valA = Math.pow(10, a);
          valB = Math.pow(10, b);
        } else {
          // Leading digit + zeros
          a = rint(1, 4);
          b = rint(1, 4);
          da = rint(2, 9);
          db = rint(2, 9);
          valA = da * Math.pow(10, a);
          valB = db * Math.pow(10, b);
        }
        // Randomize order
        if (Math.random() < 0.5) { [valA, valB] = [valB, valA]; }
        const answer = valA * valB;
        return {
          display: `${fmtNum(valA)} \u00D7 ${fmtNum(valB)}`,
          answer: answer,
          check: (input) => {
            const v = parseInt(input.replace(/[,\s]/g, ''), 10);
            return v === answer;
          },
          exact: fmtNum(answer),
          inputType: 'int',
        };
      }
    },
    mixed: {
      title: 'Mixed',
      desc: 'All drills shuffled together. Best test of real recall.',
      generate() {
        const pool = ['times', 'fractions', 'pct', 'bigmult'];
        const choice = pick(pool);
        return MODES[choice].generate();
      }
    },
  };

  // ============ TIPS CONTENT ============
  const TIPS = {
    times: {
      title: 'Times Tables (Trio)',
      intro: 'Just three pairs: 6\u00D77, 6\u00D78, 7\u00D78. These are the products that most consistently trip people up. The goal here is pure recall speed, not derivation.',
      sections: [
        {
          h: 'The three answers',
          body: '<ul><li><strong>6 \u00D7 7 = 42</strong></li><li><strong>6 \u00D7 8 = 48</strong></li><li><strong>7 \u00D7 8 = 56</strong></li></ul>'
        },
        {
          h: 'Mnemonic anchors',
          body: '<ul><li><strong>7 \u00D7 8 = 56</strong>: digits 5, 6, 7, 8 in order. The famous one.</li><li><strong>6 \u00D7 8 = 48</strong>: rhymes ("six times eight is forty-eight").</li><li><strong>6 \u00D7 7 = 42</strong>: think "the answer to life, the universe, and everything".</li></ul>'
        },
        {
          h: 'Decompose when stuck',
          body: '<p>If recall fails, break into easier pieces. Always cross-check with this.</p>',
          example: '7 \u00D7 8 = 7 \u00D7 (10 - 2) = 70 - 14 <span class="calc">= 56</span>\n6 \u00D7 7 = 6 \u00D7 (5 + 2) = 30 + 12 <span class="calc">= 42</span>'
        },
        {
          h: 'Why only these three',
          body: '<p>Multiplications by 1, 2, 5, 10 are trivial. By 3 or 4 you can double from earlier results. By 9 the digit-sum trick works. The slow products are the ones in the middle: where neither side rounds nicely and there is no shortcut, only memory.</p>'
        }
      ]
    },

    fractions: {
      title: 'Ugly Fractions',
      intro: 'These are built by taking a small simplified answer (like 7, or 3/8) and multiplying both top and bottom by a number from the small times tables (6, 8, 9, 12, 14, 15, 16, 18, 20, 24). Your job is to undo that. Everything here is doable in your head with one or two cancellation steps.',
      sections: [
        {
          h: 'Divisibility quick checks',
          body: '<ul><li><strong>By 2:</strong> last digit even.</li><li><strong>By 3:</strong> sum of digits divisible by 3.</li><li><strong>By 4:</strong> last two digits form a multiple of 4.</li><li><strong>By 5:</strong> ends in 0 or 5.</li><li><strong>By 9:</strong> digit sum divisible by 9.</li></ul>'
        },
        {
          h: 'Factor the denominator first',
          body: '<p>Always start here. The denominator is small (single or low double digits) and tells you what factors to look for in the numerator.</p><ul><li>12 = 4 \u00D7 3</li><li>14 = 2 \u00D7 7</li><li>15 = 3 \u00D7 5</li><li>16 = 2 \u00D7 8</li><li>18 = 2 \u00D7 9</li><li>20 = 4 \u00D7 5</li><li>24 = 3 \u00D7 8</li></ul>'
        },
        {
          h: 'Cancel in stages',
          body: '<p>Do not search for the full GCD. Spot one easy common factor, divide both sides, look again.</p>',
          example: '120 / 192\nBoth divisible by 8: 15 / 24\nBoth divisible by 3: 5 / 8 <span class="calc">Answer: 5/8</span>'
        },
        {
          h: 'Recognize times-table products',
          body: '<p>When the answer is an integer, the numerator is denominator \u00D7 answer. So <code>192 / 24</code>: ask "what times 24 equals 192?" 24 \u00D7 8 = 192, done.</p>',
          example: '126 / 14\n14 \u00D7 9 = 126 <span class="calc">Answer: 9</span>'
        },
        {
          h: 'Sanity-check with size',
          body: '<p>Before computing, estimate. <code>120 / 15</code> is around <code>120 / 15 \u2248 8</code>. The exact answer is 8. If you got 80 or 0.8 something went wrong with a zero.</p>'
        }
      ]
    },

    pct: {
      title: 'Fractions to Decimals',
      intro: 'The drill accepts answers within \u00B10.01, so estimates are fine. Build from anchor decimals you know by heart, refine if needed.',
      sections: [
        {
          h: 'Anchor decimals to memorize',
          body: '<ul><li>1/2 = 0.5</li><li>1/3 \u2248 0.333, 2/3 \u2248 0.667</li><li>1/4 = 0.25, 3/4 = 0.75</li><li>1/5 = 0.2, 2/5 = 0.4, ...</li><li>1/6 \u2248 0.167, 5/6 \u2248 0.833</li><li>1/7 \u2248 0.143 (the rest cycle: 0.286, 0.429, 0.571, 0.714, 0.857)</li><li>1/8 = 0.125, 3/8 = 0.375, 5/8 = 0.625, 7/8 = 0.875</li><li>1/9 \u2248 0.111 (n/9 is just 0.nnn...)</li><li>1/11 \u2248 0.091</li><li>1/12 \u2248 0.083</li></ul>'
        },
        {
          h: 'Build from anchors',
          body: '<p>Once you know unit fractions, just multiply.</p>',
          example: '5/8 = 5 \u00D7 0.125 <span class="calc">= 0.625</span>\n4/9 = 4 \u00D7 0.111... <span class="calc">\u2248 0.444</span>'
        },
        {
          h: 'Use neighbors for ugly denominators',
          body: '<p>For something like 7/13, find a nearby easy fraction.</p>',
          example: '7/13 is just above 7/14 = 1/2 = 0.5. <span class="calc">Estimate \u2248 0.54</span>'
        },
        {
          h: 'Divide directly when easy',
          body: '<p>Sometimes long division in your head is the cleanest path, especially for small numerators.</p>',
          example: '3/8: 3.000 / 8 = 0.375 <span class="calc">= 0.375</span>'
        },
        {
          h: 'Why decimals not percentages',
          body: '<p>Decimals are how these values appear in formulas and intermediate calculations. Multiplying a number by 0.625 is more natural than multiplying it by 62.5%, even though they are the same operation. Train the form you actually use.</p>'
        }
      ]
    },

    bigmult: {
      title: 'Powers of Ten',
      intro: 'The whole skill is counting zeros. Multiplying any two numbers ending in zeros decomposes into: (leading digits product) followed by (total count of trailing zeros). Build that automatic reflex so you never second-guess an order of magnitude in your work.',
      sections: [
        {
          h: 'The core rule',
          body: '<p><code>10\u1d43 \u00D7 10\u1d47 = 10\u1d43\u207a\u1d47</code>. Just add the exponents.</p>',
          example: '100 \u00D7 1000 = 10\u00B2 \u00D7 10\u00B3 = 10\u2075 <span class="calc">= 100,000</span>\n10 \u00D7 100,000 = 10\u00B9 \u00D7 10\u2075 = 10\u2076 <span class="calc">= 1,000,000</span>'
        },
        {
          h: 'With leading digits',
          body: '<p>Multiply the leading digits, then append all the trailing zeros from both numbers.</p>',
          example: '300 \u00D7 4000\nLeading: 3 \u00D7 4 = 12\nZeros: 2 + 3 = 5 trailing zeros\n<span class="calc">= 1,200,000</span>'
        },
        {
          h: 'Watch for the carry',
          body: '<p>If the leading-digit product itself ends in a zero, you gain an extra zero. Do not lose it.</p>',
          example: '500 \u00D7 2000\nLeading: 5 \u00D7 2 = 10 (one extra zero already)\nZeros from input: 2 + 3 = 5\nTotal: 5 + 1 = 6 zeros, leading "1"\n<span class="calc">= 1,000,000</span>'
        },
        {
          h: 'Anchor magnitudes',
          body: '<p>Have these in instant recall, named:</p><ul><li>10\u00B3 = thousand</li><li>10\u2076 = million</li><li>10\u2079 = billion</li><li>10\u00B9\u00B2 = trillion</li></ul><p>So <code>10\u00B3 \u00D7 10\u00B3 = million</code>, <code>10\u00B3 \u00D7 10\u2076 = billion</code>, <code>10\u2076 \u00D7 10\u2076 = trillion</code>. Recognize these instantly.</p>'
        },
        {
          h: 'For sanity checks',
          body: '<p>When you compute something and want to verify the order of magnitude, replace every number with its leading-digit-and-power form. <code>340 \u00D7 27,000</code> becomes roughly <code>3 \u00D7 10\u00B2 \u00D7 3 \u00D7 10\u2074 = 9 \u00D7 10\u2076</code>, so the answer should be around 9 million. If you got 90 thousand or 90 million, something is wrong.</p>'
        }
      ]
    },

    mixed: {
      title: 'Mixed',
      intro: 'All four drills shuffled together. Each question is randomly drawn from times tables, ugly fractions, fractions to decimals, or powers of ten.',
      sections: [
        {
          h: 'Why mix',
          body: '<p>Real situations do not announce which technique is needed. A study problem might require simplifying a fraction, then estimating a percentage, then sanity-checking the magnitude. Mixed practice trains the recognition step (which drill is this?), not just the execution step.</p>'
        },
        {
          h: 'Read individual mode tips',
          body: '<p>Each mode has its own tips page. Go back to the home screen and tap the ? next to each mode for techniques specific to that type of problem.</p>'
        },
        {
          h: 'Keypad adapts per question',
          body: '<p>When a fraction question comes up, the / key appears. For a decimal question, the . key appears. For integer answers, only digits. The keypad layout shifts to match what the current question needs.</p>'
        }
      ]
    },
  };

  // ============ RENDERING ============
  const app = document.getElementById('app');

  function render() {
    if (state.screen === 'home') renderHome();
    else if (state.screen === 'tips') renderTips();
    else renderPlay();
  }

  function renderHome() {
    state.score = 0;
    state.streak = 0;
    state.bestStreak = 0;
    if (state.timerHandle) {
      cancelAnimationFrame(state.timerHandle);
      state.timerHandle = null;
    }

    const modeOrder = ['times', 'fractions', 'pct', 'bigmult', 'mixed'];
    const modeButtons = modeOrder.map(key => {
      const m = MODES[key];
      return `<div class="mode-row">
        <button class="mode-btn" data-mode="${key}">
          <span class="title">${m.title}</span>
          <span class="desc">${m.desc}</span>
        </button>
        <button class="info-btn" data-tips="${key}" aria-label="How to do ${m.title}">?</button>
      </div>`;
    }).join('');

    const timerOpts = [5, 10, 20].map(t =>
      `<button class="timer-opt ${state.timeLimit === t ? 'active' : ''}" data-time="${t}">${t}s</button>`
    ).join('');

    app.innerHTML = `
      <div class="home">
        <h1>Mental Math</h1>
        <div class="sub">Pick a drill. Tap the ? for tips on each mode.</div>
        ${modeButtons}
        <div class="timer-row">
          <div class="label">Time per question</div>
          <div class="timer-options">${timerOpts}</div>
        </div>
      </div>
    `;

    app.querySelectorAll('.mode-btn').forEach(btn => {
      btn.addEventListener('click', () => startMode(btn.dataset.mode));
    });
    app.querySelectorAll('.info-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        showTips(btn.dataset.tips, 'home');
      });
    });
    app.querySelectorAll('.timer-opt').forEach(btn => {
      btn.addEventListener('click', () => {
        state.timeLimit = parseInt(btn.dataset.time, 10);
        renderHome();
      });
    });
  }

  function showTips(modeKey, returnTo) {
    state.tipsMode = modeKey;
    state.tipsReturnTo = returnTo;
    if (state.timerHandle) {
      cancelAnimationFrame(state.timerHandle);
      state.timerHandle = null;
    }
    state.screen = 'tips';
    renderTips();
  }

  function renderTips() {
    const t = TIPS[state.tipsMode];
    if (!t) { state.screen = 'home'; renderHome(); return; }

    const sectionsHTML = t.sections.map(s => {
      let html = `<h3>${s.h}</h3>${s.body}`;
      if (s.example) {
        html += `<div class="example">${s.example.replace(/\n/g, '<br>')}</div>`;
      }
      return html;
    }).join('');

    app.innerHTML = `
      <div class="tips">
        <div class="tips-bar">
          <button class="back" id="tips-back" aria-label="Back">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
          </button>
          <div class="title-text">How to</div>
        </div>
        <div class="tips-content">
          <h2>${t.title}</h2>
          <div class="intro">${t.intro}</div>
          ${sectionsHTML}
        </div>
      </div>
    `;

    document.getElementById('tips-back').addEventListener('click', () => {
      if (state.tipsReturnTo === 'play' && state.mode === state.tipsMode) {
        state.screen = 'play';
        nextQuestion();
      } else {
        state.screen = 'home';
        renderHome();
      }
    });
  }


  function startMode(modeKey) {
    state.mode = modeKey;
    state.screen = 'play';
    state.score = 0;
    state.streak = 0;
    state.bestStreak = 0;
    nextQuestion();
  }

  function nextQuestion() {
    state.current = MODES[state.mode].generate();
    state.input = '';
    state.feedback = null;
    state.locked = false;
    state.timerStart = Date.now();
    renderPlay();
    startTimer();
  }

  function startTimer() {
    if (state.timerHandle) cancelAnimationFrame(state.timerHandle);
    const tick = () => {
      const elapsed = (Date.now() - state.timerStart) / 1000;
      const frac = Math.min(1, elapsed / state.timeLimit);
      updateTimerBar(frac);
      if (frac >= 1) {
        if (!state.locked) {
          submitAnswer(true);
        }
        return;
      }
      state.timerHandle = requestAnimationFrame(tick);
    };
    state.timerHandle = requestAnimationFrame(tick);
  }

  function updateTimerBar(frac) {
    const bar = document.getElementById('timer-fill');
    if (!bar) return;
    bar.style.width = ((1 - frac) * 100) + '%';
    bar.className = 'timer-fill';
    if (frac > 0.75) bar.className += ' danger';
    else if (frac > 0.5) bar.className += ' warning';
  }

  function renderPlay() {
    const cur = state.current;
    const inputType = cur.inputType;

    let displayText = state.input || '';
    let displayClass = 'answer-display';
    if (state.feedback === 'correct') displayClass += ' correct';
    else if (state.feedback === 'wrong') displayClass += ' wrong';

    const subPromptHTML = cur.subPrompt
      ? `<div class="small">${cur.subPrompt}</div>` : '';

    let feedbackHTML = '';
    if (state.feedback === 'correct') {
      feedbackHTML = `<div class="feedback correct">Correct</div>`;
    } else if (state.feedback === 'wrong') {
      feedbackHTML = `<div class="feedback wrong">Answer: ${cur.exact}</div>`;
    } else if (state.feedback === 'timeout') {
      feedbackHTML = `<div class="feedback wrong">Time up. Answer: ${cur.exact}</div>`;
    } else {
      feedbackHTML = `<div class="feedback"></div>`;
    }

    // Build keypad
    const keys = buildKeypadKeys(inputType);

    app.innerHTML = `
      <div class="play">
        <div class="topbar">
          <button class="home-btn" id="go-home" aria-label="Home">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12L12 4l9 8"/><path d="M5 10v10h14V10"/></svg>
          </button>
          <div class="stats">
            <div class="stat"><span class="label">Score</span><span class="value score">${state.score}</span></div>
            <div class="stat"><span class="label">Streak</span><span class="value streak">${state.streak}</span></div>
            <div class="stat"><span class="label">Best</span><span class="value">${state.bestStreak}</span></div>
          </div>
          <button class="play-info-btn" id="play-tips" aria-label="Tips">?</button>
        </div>
        <div class="timer-bar"><div class="timer-fill" id="timer-fill" style="width:100%"></div></div>
        <div class="problem-area">
          ${subPromptHTML}
          <div class="problem">${cur.display}${cur.subPrompt ? '' : ' = ?'}</div>
          <div class="${displayClass}">${displayText || '<span class="placeholder">_</span>'}</div>
          ${feedbackHTML}
        </div>
        <div class="keypad">${keys}</div>
      </div>
    `;

    document.getElementById('go-home').addEventListener('click', goHome);
    document.getElementById('play-tips').addEventListener('click', () => {
      showTips(state.mode, 'play');
    });
    app.querySelectorAll('.key').forEach(k => {
      // Use touchstart for instant response on mobile, click as fallback for desktop.
      // Track per-key fired state to prevent double-firing from the synthesized click.
      let touched = false;
      k.addEventListener('touchstart', (e) => {
        e.preventDefault();
        touched = true;
        const v = e.currentTarget.dataset.k;
        onKey(v);
      }, { passive: false });
      k.addEventListener('click', (e) => {
        if (touched) { touched = false; return; }
        const v = e.currentTarget.dataset.k;
        onKey(v);
      });
    });
  }

  function buildKeypadKeys(inputType) {
    // Determine extra keys based on input type
    let extraKey;
    if (inputType === 'frac') extraKey = { label: '/', val: '/' };
    else if (inputType === 'decimal') extraKey = { label: '.', val: '.' };
    else extraKey = { label: '', val: null };

    const layout = [
      ['1','2','3'],
      ['4','5','6'],
      ['7','8','9'],
    ];

    let html = '';
    for (const row of layout) {
      for (const k of row) {
        html += `<button class="key" data-k="${k}">${k}</button>`;
      }
    }
    // Last row: extra | 0 | delete
    const extraHTML = extraKey.val
      ? `<button class="key" data-k="${extraKey.val}">${extraKey.label}</button>`
      : `<button class="key disabled"></button>`;
    html += extraHTML;
    html += `<button class="key" data-k="0">0</button>`;
    html += `<button class="key action" data-k="DEL" aria-label="Delete">DEL</button>`;
    // Submit spans full width
    html += `<button class="key submit" data-k="OK" style="grid-column: span 3">SUBMIT</button>`;
    return html;
  }

  function onKey(k) {
    if (state.locked) {
      // Locked: allow any tap to advance to next question
      nextQuestion();
      return;
    }
    if (k === 'DEL') {
      state.input = state.input.slice(0, -1);
      updateInputOnly();
      return;
    }
    if (k === 'OK') {
      if (state.input.length === 0) return;
      submitAnswer(false);
      return;
    }
    // Numeric or fraction/decimal char
    if (k === '/') {
      if (state.input.includes('/') || state.input.length === 0) return;
      state.input += '/';
    } else if (k === '.') {
      if (state.input.includes('.')) return;
      if (state.input.length === 0) state.input = '0.';
      else state.input += '.';
    } else {
      // digit
      if (state.input.length >= 8) return;
      state.input += k;
    }
    updateInputOnly();
  }

  function updateInputOnly() {
    const disp = document.querySelector('.answer-display');
    if (!disp) return;
    if (state.input) {
      disp.textContent = state.input;
    } else {
      disp.innerHTML = '<span class="placeholder">_</span>';
    }
  }

  function submitAnswer(timedOut) {
    if (state.locked) return;
    state.locked = true;
    if (state.timerHandle) {
      cancelAnimationFrame(state.timerHandle);
      state.timerHandle = null;
    }

    const cur = state.current;
    let correct = false;
    if (!timedOut && state.input.length > 0) {
      correct = cur.check(state.input);
    }

    if (correct) {
      state.score += 1;
      state.streak += 1;
      if (state.streak > state.bestStreak) state.bestStreak = state.streak;
      state.feedback = 'correct';
    } else {
      state.streak = 0;
      state.feedback = timedOut ? 'timeout' : 'wrong';
    }

    renderPlay();
    // Auto advance after a short delay
    const delay = correct ? 600 : 1400;
    setTimeout(() => {
      if (state.screen === 'play' && state.locked) {
        nextQuestion();
      }
    }, delay);
  }

  function goHome() {
    if (state.timerHandle) {
      cancelAnimationFrame(state.timerHandle);
      state.timerHandle = null;
    }
    state.screen = 'home';
    state.locked = false;
    render();
  }

  // Prevent pinch-zoom (but allow rapid tapping; double-tap-zoom is handled per-element via CSS touch-action)
  document.addEventListener('touchmove', (e) => {
    if (e.touches.length > 1) e.preventDefault();
  }, { passive: false });

  // Kick off
  render();
})();
</script>
</body>
</html>
